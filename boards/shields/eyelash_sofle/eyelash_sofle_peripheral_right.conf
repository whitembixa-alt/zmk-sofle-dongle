CONFIG_ZMK_USB=n

# Enable SPI
CONFIG_SPI=y

#EXT POWER
CONFIG_ZMK_EXT_POWER=y

# Backlight
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n

# RGB
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160

# === Battery (Peripheral) ===
CONFIG_SETTINGS=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_HISTORY=y
CONFIG_ZMK_BATTERY_HISTORY_INTERVAL_MINUTES=300
CONFIG_ZMK_BATTERY_HISTORY_MAX_ENTRIES=96
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300 
CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=n
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SPLIT_RELAY_EVENT=y

# Hammerbeam slideshow
CONFIG_CUSTOM_ANIMATION_SPEED=3000000 
# 3000 second total duration
# 30 pictures, so 100 seconds per picture